name: OpenCode Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          if ! jq empty ide/opencode/opencode.flowforge.json 2>/dev/null; then
            echo "ERROR: Invalid JSON in opencode.flowforge.json"
            exit 1
          fi

      - name: Validate subagent config
        run: |
          count=$(jq '[.agent[] | select(.mode == "subagent")] | length' ide/opencode/opencode.flowforge.json)
          if [ "$count" -ne 7 ]; then
            echo "ERROR: Expected 7 subagents, found $count"
            exit 1
          fi
          echo "Found $count subagents"

      - name: Validate skill paths exist
        run: |
          # Get all skill paths and check they resolve to real files
          # Substitute __FLOWFORGE_REPO__ with $GITHUB_WORKSPACE
          for skill in forge-discovery forge-arch forge-plan forge-dev forge-verify forge-memory forge-teacher; do
            path=$(jq -r ".agent.\"$skill\".prompt" ide/opencode/opencode.flowforge.json 2>/dev/null | grep -o "{file:__FLOWFORGE_REPO__/skills/$skill/SKILL.md}" | head -1)
            if [ -z "$path" ]; then
              # Try alternate pattern
              path=$(jq -r ".agent.\"$skill\".prompt" ide/opencode/opencode.flowforge.json 2>/dev/null | grep -oE "\{file:[^}]+skills/$skill/SKILL\.md\}" | head -1)
            fi
            if [ -n "$path" ]; then
              resolved="${path//__FLOWFORGE_REPLACE__/$GITHUB_WORKSPACE}"
              resolved="${resolved//__FLOWFORGE_REPO__/$GITHUB_WORKSPACE}"
              resolved="${resolved//\{file:/}"
              resolved="${resolved//\}/}"
              if [ ! -f "$resolved" ]; then
                echo "ERROR: Missing SKILL.md: $resolved"
                exit 1
              fi
              echo "OK: $resolved exists"
            fi
          done

      - name: Check for placeholders
        run: |
          if grep -qE '__UNSET__|__TODO__|__FIXME__' ide/opencode/opencode.flowforge.json; then
            echo "ERROR: Found unresolved placeholders in opencode.flowforge.json"
            grep -E '__UNSET__|__TODO__|__FIXME__' ide/opencode/opencode.flowforge.json || true
            exit 1
          fi
          echo "No unresolved placeholders found"

      - name: Lint SKILL.md completeness (Layer 1 — item 22)
        run: |
          FAIL=0
          for skill in forge-discovery forge-arch forge-plan forge-dev forge-verify forge-memory forge-teacher forge-orchestrator; do
            f="skills/$skill/SKILL.md"
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              FAIL=1
              continue
            fi
            count=$(grep -c "^## " "$f" || true)
            if [ "$count" -lt 3 ]; then
              echo "ERROR: $f has only $count top-level sections (minimum 3)"
              FAIL=1
            else
              echo "OK: $f ($count sections)"
            fi
          done
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Lint AGENTS.md skill cross-references (Layer 1 — item 22)
        run: |
          FAIL=0
          while IFS= read -r path; do
            if [ ! -f "$path" ]; then
              echo "ERROR: AGENTS.md references missing file: $path"
              FAIL=1
            fi
          done < <(grep -oE 'skills/[a-z/-]+/SKILL\.md' AGENTS.md | sort -u)
          [ "$FAIL" -eq 0 ] && echo "All AGENTS.md skill references resolve" || exit 1

      - name: Smoke flow-init.sh (Layer 1 — item 22)
        run: |
          SMOKE_DIR=$(mktemp -d)
          # flow-init.sh takes positional args: <project-path> [ProjectName]
          # ide/install.sh may warn in CI (no IDE present) but is non-fatal
          bash flow-init.sh "$SMOKE_DIR" "smoke-test" 2>&1 || true
          FAIL=0
          for expected in AGENTS.md .flowforge.json docs/DEVELOPMENT.md docs/architecture/adr docs/architecture/rfc; do
            if [ ! -e "$SMOKE_DIR/$expected" ]; then
              echo "ERROR: flow-init did not create $expected"
              FAIL=1
            else
              echo "OK: $expected"
            fi
          done
          rm -rf "$SMOKE_DIR"
          [ "$FAIL" -eq 0 ] || exit 1